<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofia Assistant</title>
    <!-- Modern font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
</head>
<body>
    <div id="particles-js"></div>
    <div class="app-container">
        <!-- Visualizer Area -->
        <div class="visualizer-container">
            <div class="glow-ring"></div>
            <div id="orb" class="orb idle"></div>
            <div id="status-text" class="status-text">Sofia is ready</div>
        </div>

        <!-- Chat Area -->
        <div class="chat-container">
            <div class="chat-header">
                <h2>Sofia AI</h2>
                <span class="status-indicator"></span>
            </div>
            <div id="chat-box" class="chat-box">
                <div class="message system">
                    <div class="message-content">Hello! I am Sofia. How can I help you today?</div>
                </div>
            </div>
            
            <div class="input-area">
                <input type="text" id="command-input" placeholder="Type a command..." autocomplete="off">
                <button id="send-btn" class="icon-btn" title="Send (Enter)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
                <button id="mic-btn" class="icon-btn pulse-glow" title="Hold to Speak">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
                </button>
            </div>
        </div>
    </div>
    <!-- Add particles.js for a premium interactive background -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
